services:
  backend:
    build: ./backend
    container_name: vitalscan-backend
    restart: unless-stopped
    environment:
      # Set to "false" once SCAMPS/UBFC data is staged on the host and you
      # want the real rPPG pipeline to run instead of returning mock data.
      VITALSCAN_USE_MOCK: ${VITALSCAN_USE_MOCK:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      # Direct API access on the host (e.g. curl http://localhost:8000/biometrics)
      - "8000:8000"
    volumes:
      # Writable scan log — persists POST /scan results across container restarts.
      # Committed as `{"scans": []}` so a fresh clone doesn't bind-mount a directory.
      - ./data/scan_history.json:/app/data/scan_history.json
    networks:
      - vitalscan-internal

  frontend:
    build: ./frontend
    container_name: vitalscan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Dashboard on http://localhost:8080 ; nginx proxies /api/* to the backend
      - "8080:80"
    networks:
      - vitalscan-internal

networks:
  vitalscan-internal:
    driver: bridge
