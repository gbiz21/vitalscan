services:
  backend:
    build: ./backend
    container_name: vitalscan-backend
    restart: unless-stopped
    environment:
      # Set to "false" once SCAMPS/UBFC data is staged on the host and you
      # want the real rPPG pipeline to run instead of returning mock data.
      VITALSCAN_USE_MOCK: ${VITALSCAN_USE_MOCK:-true}
      # Tighten this for production — listing the dashboard origin only.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vitalscan.bkre8tive.com}
    networks:
      - vitalscan-internal
    # Backend is reached via the frontend nginx proxy at /api — no Traefik
    # router needed unless you want to expose the API directly.
    labels:
      - "traefik.enable=false"

  frontend:
    build: ./frontend
    container_name: vitalscan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vitalscan-internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"

      # HTTPS router on websecure entrypoint with Let's Encrypt resolver.
      # The resolver name "letsencrypt" must match what your Traefik
      # static config defines — adjust if yours uses a different name.
      - "traefik.http.routers.vitalscan.rule=Host(`vitalscan.bkre8tive.com`)"
      - "traefik.http.routers.vitalscan.entrypoints=websecure"
      - "traefik.http.routers.vitalscan.tls=true"
      - "traefik.http.routers.vitalscan.tls.certresolver=letsencrypt"
      - "traefik.http.services.vitalscan.loadbalancer.server.port=80"

      # HTTP -> HTTPS redirect so http://vitalscan.bkre8tive.com upgrades.
      - "traefik.http.routers.vitalscan-http.rule=Host(`vitalscan.bkre8tive.com`)"
      - "traefik.http.routers.vitalscan-http.entrypoints=web"
      - "traefik.http.routers.vitalscan-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

networks:
  # Internal network for backend <-> frontend traffic only.
  vitalscan-internal:
    driver: bridge
  # External network shared with Traefik. Create once on the host with:
  #   docker network create traefik
  # If your Traefik stack already uses a different network name (e.g. "web",
  # "proxy"), change this to match and update the traefik.docker.network label.
  traefik:
    external: true
