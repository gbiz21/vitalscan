services:
  backend:
    build: ./backend
    container_name: vitalscan-backend
    restart: unless-stopped
    environment:
      # Set to "false" once SCAMPS/UBFC data is staged on the host and you
      # want the real rPPG pipeline to run instead of returning mock data.
      VITALSCAN_USE_MOCK: ${VITALSCAN_USE_MOCK:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vitalscan.lab.bkre8tive.com}
    networks:
      - vitalscan-internal

  frontend:
    build: ./frontend
    container_name: vitalscan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vitalscan-internal
      # Exposed to Traefik via the existing traefik_default network. The route
      # itself is defined in the Traefik file provider at:
      #   /opt/traefik/dynamic/vitalscan.yml  (on the homelab traefik host)
      # Docker labels are NOT used because this Traefik instance runs with
      # --providers.file.directory only, no Docker provider.
      - traefik_default

networks:
  vitalscan-internal:
    driver: bridge
  traefik_default:
    external: true
