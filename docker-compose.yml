services:
  backend:
    build: ./backend
    container_name: vitalscan-backend
    restart: unless-stopped
    environment:
      # Set to "false" once SCAMPS/UBFC data is staged on the host and you
      # want the real rPPG pipeline to run instead of returning mock data.
      VITALSCAN_USE_MOCK: ${VITALSCAN_USE_MOCK:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vitalscan.bkre8tive.com}
    volumes:
      # Mount the precomputed sample biomarkers so GET /biomarkers works.
      # Small (~14 KB), updateable without rebuild.
      - ./data/sample_biomarkers.json:/app/data/sample_biomarkers.json:ro
      # Writable scan log — persists POST /scan results across container restarts
      # so Groups 3+4 can GET /scans for results performed by other users.
      - ./data/scan_history.json:/app/data/scan_history.json
    networks:
      - vitalscan-internal

  frontend:
    build: ./frontend
    container_name: vitalscan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - vitalscan-internal

  # Named Cloudflare Tunnel publishing https://vitalscan.bkre8tive.com.
  # Tunnel UUID and ingress rules live in deploy/cloudflared/config.yml.
  # The matching credentials JSON (TunnelSecret) is gitignored — copy it
  # to deploy/cloudflared/ on the homelab via scp before bringing the stack
  # up. See DEPLOY.md.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: vitalscan-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./deploy/cloudflared:/etc/cloudflared:ro
    depends_on:
      - frontend
    networks:
      - vitalscan-internal

networks:
  vitalscan-internal:
    driver: bridge
