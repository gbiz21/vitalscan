# Traefik dynamic route for VitalScan.
#
# Deployed to /opt/traefik/dynamic/vitalscan.yml on the homelab traefik host.
# Traefik watches the dynamic dir and hot-reloads on changes.

http:
  routers:
    # HTTPS router (websecure entrypoint, uses the *.lab.bkre8tive.com wildcard cert).
    vitalscan:
      rule: "Host(`vitalscan.lab.bkre8tive.com`)"
      entryPoints:
        - websecure
      service: vitalscan
      tls: {}

    # HTTP router that 301-redirects to HTTPS so plain http://vitalscan... works.
    vitalscan-http:
      rule: "Host(`vitalscan.lab.bkre8tive.com`)"
      entryPoints:
        - web
      service: vitalscan
      middlewares:
        - vitalscan-https-redirect

  middlewares:
    vitalscan-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

  services:
    vitalscan:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://vitalscan-frontend:80"
