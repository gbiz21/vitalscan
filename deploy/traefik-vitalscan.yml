# Traefik dynamic route for VitalScan.
#
# Deployed to /opt/traefik/dynamic/vitalscan.yml on the homelab traefik host.
# Traefik watches the dynamic dir and hot-reloads on changes.
#
# Hostname uses the *.lab.bkre8tive.com wildcard cert that's already mounted
# in Traefik. The OPNsense wildcard A record (*.lab.bkre8tive.com -> 10.10.10.6)
# means no per-app DNS entry is needed.

http:
  routers:
    vitalscan:
      rule: "Host(`vitalscan.lab.bkre8tive.com`)"
      entryPoints:
        - websecure
      service: vitalscan
      tls: {}

  services:
    vitalscan:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://vitalscan-frontend:80"
