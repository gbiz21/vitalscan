<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 880" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .title { font-size: 20px; font-weight: 600; fill: #111827; }
      .subtitle { font-size: 12px; fill: #6B7280; }
      .tier { font-size: 13px; font-weight: 700; fill: #111827; letter-spacing: 0.4px; }
      .lbl { font-size: 13px; font-weight: 600; fill: #111827; }
      .sub { font-size: 10px; fill: #374151; }
      .mono { font-family: ui-monospace, 'SF Mono', monospace; }
      .edge-fwd { font-size: 11px; font-weight: 600; fill: #111827; }
      .footer { font-size: 10px; fill: #6B7280; font-style: italic; }
    </style>
  </defs>

  <text x="570" y="32" text-anchor="middle" class="title">Figure 2 — System Architecture &amp; Data Flow</text>
  <text x="570" y="52" text-anchor="middle" class="subtitle">VitalScan · Group 1 · AIT 500 · Deployed at vitalscan.bkre8tive.com</text>

  <!-- ===== Tier 1 — Client ===== -->
  <rect x="60" y="80" width="1020" height="150" rx="10" fill="#FAFAFA" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="76" y="100" class="tier">CLIENT  (any device)</text>

  <rect x="80" y="115" width="320" height="100" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="240" y="140" text-anchor="middle" class="lbl">Webcam capture</text>
  <text x="240" y="160" text-anchor="middle" class="sub mono">getUserMedia() + MediaRecorder</text>
  <text x="240" y="178" text-anchor="middle" class="sub">30 s WebM @ 30 fps</text>
  <text x="240" y="195" text-anchor="middle" class="sub">in-browser, no plugin</text>

  <rect x="430" y="115" width="280" height="100" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="570" y="140" text-anchor="middle" class="lbl">User browser</text>
  <text x="570" y="160" text-anchor="middle" class="sub mono">vitalscan.bkre8tive.com</text>
  <text x="570" y="178" text-anchor="middle" class="sub">React 18 · Vite · TS · Tailwind</text>
  <text x="570" y="195" text-anchor="middle" class="sub">dashboard + body figure</text>

  <rect x="740" y="115" width="320" height="100" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="900" y="140" text-anchor="middle" class="lbl">File upload</text>
  <text x="900" y="160" text-anchor="middle" class="sub mono">&lt;input type="file"&gt;</text>
  <text x="900" y="178" text-anchor="middle" class="sub">.mp4 · .webm · .mov · .avi · .mkv</text>
  <text x="900" y="195" text-anchor="middle" class="sub">≤ 100 MB</text>

  <!-- Arrow 1: Client → Cloudflare -->
  <line x1="570" y1="230" x2="570" y2="265" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="585" y="252" class="edge-fwd">①</text>
  <text x="605" y="252" class="sub">HTTPS POST /scan · multipart video (5–15 MB typical)</text>

  <!-- ===== Tier 2 — Cloudflare ===== -->
  <rect x="60" y="270" width="1020" height="130" rx="10" fill="#FAFAFA" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="76" y="290" class="tier">CLOUDFLARE  (managed edge + tunnel)</text>

  <rect x="80" y="305" width="490" height="85" rx="8" fill="#EBF2FA" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="325" y="328" text-anchor="middle" class="lbl">Cloudflare edge</text>
  <text x="325" y="348" text-anchor="middle" class="sub">TLS termination · DNS · DDoS shield · WAF</text>
  <text x="325" y="365" text-anchor="middle" class="sub">cert auto-renewed at edge</text>
  <text x="325" y="382" text-anchor="middle" class="sub">no origin certificate on homelab</text>

  <rect x="590" y="305" width="470" height="85" rx="8" fill="#EBF2FA" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="825" y="328" text-anchor="middle" class="lbl">Cloudflare Tunnel</text>
  <text x="825" y="348" text-anchor="middle" class="sub">named tunnel · outbound-only QUIC</text>
  <text x="825" y="365" text-anchor="middle" class="sub">no public IP · no port forward</text>
  <text x="825" y="382" text-anchor="middle" class="sub">homelab firewall stays closed</text>

  <line x1="571" y1="347" x2="588" y2="347" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Arrow 2: Cloudflare → Homelab -->
  <line x1="180" y1="400" x2="180" y2="470" stroke="#374151" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="195" y="430" class="edge-fwd">②</text>
  <text x="215" y="430" class="sub">tunnel terminates at cloudflared container in homelab</text>

  <!-- ===== Tier 3 — Homelab Docker host ===== -->
  <rect x="60" y="440" width="730" height="340" rx="10" fill="#FAFAFA" stroke="#374151" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="76" y="460" class="tier">HOMELAB HOST  ·  docker-compose</text>

  <!-- cloudflared container -->
  <rect x="80" y="475" width="200" height="290" rx="8" fill="#EBF2FA" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="180" y="500" text-anchor="middle" class="lbl">cloudflared</text>
  <text x="180" y="520" text-anchor="middle" class="sub">routes</text>
  <text x="180" y="535" text-anchor="middle" class="sub mono">vitalscan.bkre8tive.com</text>
  <text x="180" y="552" text-anchor="middle" class="sub">→ frontend:80</text>
  <text x="180" y="585" text-anchor="middle" class="sub">config:</text>
  <text x="180" y="600" text-anchor="middle" class="sub mono">deploy/cloudflared/</text>
  <text x="180" y="614" text-anchor="middle" class="sub mono">config.yml</text>
  <text x="180" y="645" text-anchor="middle" class="sub">credentials JSON</text>
  <text x="180" y="659" text-anchor="middle" class="sub">mounted (gitignored)</text>

  <!-- frontend container -->
  <rect x="300" y="475" width="200" height="290" rx="8" fill="#E6F4EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="400" y="500" text-anchor="middle" class="lbl">frontend</text>
  <text x="400" y="520" text-anchor="middle" class="sub">nginx :80 serves</text>
  <text x="400" y="535" text-anchor="middle" class="sub">Vite production build</text>
  <text x="400" y="568" text-anchor="middle" class="sub">Dashboard</text>
  <text x="400" y="582" text-anchor="middle" class="sub">BodyFigure SVG + markers</text>
  <text x="400" y="596" text-anchor="middle" class="sub">MetricCards</text>
  <text x="400" y="630" text-anchor="middle" class="sub">nginx reverse-proxies</text>
  <text x="400" y="644" text-anchor="middle" class="sub mono">/scan → backend:8000</text>
  <text x="400" y="676" text-anchor="middle" class="sub">same-origin in prod</text>
  <text x="400" y="690" text-anchor="middle" class="sub">(no CORS dance)</text>

  <!-- backend container -->
  <rect x="520" y="475" width="250" height="290" rx="8" fill="#E6F4EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="645" y="500" text-anchor="middle" class="lbl">backend</text>
  <text x="645" y="520" text-anchor="middle" class="sub">FastAPI + uvicorn :8000</text>
  <text x="645" y="535" text-anchor="middle" class="sub">Python 3.12 · numpy &lt; 2</text>
  <text x="645" y="555" text-anchor="middle" class="sub mono" font-weight="600">/ · /scan · /scan/mock</text>

  <rect x="540" y="580" width="210" height="170" rx="6" fill="#FFFFFF" stroke="#1D9E75" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="645" y="600" text-anchor="middle" class="sub" font-weight="700">rPPG pipeline (see Figure 1)</text>
  <rect x="555" y="610" width="180" height="22" rx="4" fill="#E6F4EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="645" y="625" text-anchor="middle" class="sub mono">face_detection.py</text>
  <rect x="555" y="640" width="180" height="22" rx="4" fill="#E6F4EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="645" y="655" text-anchor="middle" class="sub mono">pos_algorithm.py</text>
  <rect x="555" y="670" width="180" height="22" rx="4" fill="#E6F4EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="645" y="685" text-anchor="middle" class="sub mono">hrv.py</text>
  <text x="645" y="715" text-anchor="middle" class="sub">env: VITALSCAN_USE_MOCK</text>
  <text x="645" y="730" text-anchor="middle" class="sub">toggles real vs mock pipeline</text>

  <!-- intra-homelab arrows -->
  <line x1="280" y1="585" x2="299" y2="585" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="290" y="578" text-anchor="middle" class="sub" font-weight="600">③ :80</text>
  <line x1="500" y1="585" x2="519" y2="585" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="510" y="578" text-anchor="middle" class="sub" font-weight="600">④ :8000</text>

  <!-- ===== Side panel — Offline eval ===== -->
  <rect x="820" y="440" width="280" height="340" rx="10" fill="#FAFAFA" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="836" y="460" class="tier">OFFLINE EVAL  (Task 4)</text>

  <rect x="840" y="478" width="240" height="80" rx="6" fill="#FBF1E3" stroke="#BA7517" stroke-width="1.2"/>
  <text x="960" y="500" text-anchor="middle" class="lbl">SCAMPS</text>
  <text x="960" y="518" text-anchor="middle" class="sub">Microsoft synthetic avatars</text>
  <text x="960" y="534" text-anchor="middle" class="sub">MAE 28.86 BPM (n = 10)</text>
  <text x="960" y="550" text-anchor="middle" class="sub">synthetic-data baseline</text>

  <rect x="840" y="568" width="240" height="80" rx="6" fill="#FBF1E3" stroke="#BA7517" stroke-width="1.2"/>
  <text x="960" y="590" text-anchor="middle" class="lbl">UBFC-rPPG</text>
  <text x="960" y="608" text-anchor="middle" class="sub">42 real human subjects</text>
  <text x="960" y="624" text-anchor="middle" class="sub" font-weight="700" fill="#1D9E75">MAE 4.10 BPM · median 1.05</text>
  <text x="960" y="640" text-anchor="middle" class="sub">rubric pass</text>

  <rect x="840" y="658" width="240" height="80" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="960" y="680" text-anchor="middle" class="lbl">evaluation.py</text>
  <text x="960" y="698" text-anchor="middle" class="sub">same pipeline code as runtime</text>
  <text x="960" y="714" text-anchor="middle" class="sub mono">→ data/eval_*.csv</text>
  <text x="960" y="730" text-anchor="middle" class="sub mono">→ docs/evaluation_results.md</text>

  <!-- dotted shared-code line from rppg → evaluation.py -->
  <path d="M 755 685 L 840 700" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
  <text x="800" y="678" class="footer">shares pipeline code</text>

  <!-- Return path note -->
  <text x="570" y="810" text-anchor="middle" class="footer">⑤ JSON response retraces the same path: backend → frontend → cloudflared → tunnel → edge → browser</text>
  <text x="570" y="828" text-anchor="middle" class="footer mono">{ "biomarkers": { "heart_rate": 72, "hrv_sdnn": 45, "stress_index": 0.6, "blood_pressure": { "systolic": 138, "diastolic": 88 } } }</text>
  <text x="570" y="858" text-anchor="middle" class="footer">⑥ React updates MetricCards + BodyFigure markers on receipt</text>
</svg>
